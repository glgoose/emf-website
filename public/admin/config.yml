# Sveltia CMS configuration for Ernest Mandelfonds
# TODO: set your GitHub repo and branch below

backend:
  name: github
  repo: glgoose/emf-website
  branch: main
  base_url: https://sveltia-cms-auth.glenngoossens.workers.dev

media_folder: public/images
public_folder: /images

collections:
  # ── Activiteiten (events) ──────────────────────────────────────────────────
  - name: events
    label: Activiteiten
    label_singular: Activiteit
    folder: src/content/events
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Type activiteit
        name: type
        widget: select
        required: true
        options:
          - { label: Boekvoorstelling, value: boekvoorstelling }
          - { label: Studiedag, value: studiedag }
          - { label: Leesgroep, value: leesgroep }
          - { label: Lezing, value: lezing }
          - { label: Rondleiding, value: rondleiding }
          - { label: Panelgesprek, value: panelgesprek }

      - label: Titel
        name: title
        widget: string
        required: true

      - label: Ondertitel
        name: subtitle
        widget: string
        required: false

      - label: Datum
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: true

      - label: Tijdstip (start)
        name: time
        widget: string
        hint: "Bijv. 14:00 of 19:30"
        required: true

      - label: Tijdstip (einde)
        name: end_time
        widget: string
        hint: "Bijv. 16:30"
        required: false

      - label: Locatie (naam)
        name: location
        widget: string
        required: false

      - label: Adres
        name: address
        widget: string
        required: false

      - label: Korte beschrijving
        name: description
        widget: text
        required: true
        hint: "Korte samenvatting, getoond in overzichten."

      - label: Sprekers
        name: speakers
        widget: list
        required: false
        fields:
          - label: Naam
            name: name
            widget: string
          - label: Bio (één item per regel)
            name: bio
            widget: list
            required: false
            field:
              label: Regel
              name: item
              widget: string

      - label: Prijs
        name: price
        widget: string
        required: false
        hint: "Bijv. gratis, €10, €14 (studenten €7)"

      - label: Omslagafbeelding
        name: cover
        widget: image
        required: false

      - label: Cover filter (CSS)
        name: cover_filter
        widget: string
        required: false
        hint: "Bijv. brightness(0.97)"

      - label: Inschrijving open
        name: registration_open
        widget: boolean
        default: false
        required: false

      - label: Inschrijvingsdeadline
        name: registration_deadline
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: false

      - label: Maximum aantal deelnemers
        name: capacity
        widget: number
        required: false
        hint: "Laat leeg voor geen limiet."

      - label: Baserow tabel-ID
        name: baserow_table_id
        widget: string
        required: false
        hint: "Het numerieke ID van de Baserow tabel voor inschrijvingen."

      - label: Notitie organisatoren
        name: organizer_note
        widget: text
        required: false

      - label: Volledige tekst
        name: body
        widget: markdown
        required: false
        hint: "Uitgebreide info over de activiteit."

  # ── Nieuws ────────────────────────────────────────────────────────────────
  - name: news
    label: Nieuws
    label_singular: Nieuwsbericht
    folder: src/content/news
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Titel
        name: title
        widget: string
        required: true

      - label: Datum
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: true

      - label: Samenvatting
        name: summary
        widget: text
        required: true
        hint: "Korte samenvatting, getoond in overzichten."

      - label: Volledige tekst
        name: body
        widget: markdown
        required: false

  # ── Publicaties (posts) ────────────────────────────────────────────────────
  - name: posts
    label: Publicaties
    label_singular: Publicatie
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Titel
        name: title
        widget: string
        required: true

      - label: Datum
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: true

      - label: Samenvatting
        name: summary
        widget: text
        required: true
        hint: "Korte samenvatting, getoond in overzichten."

      - label: Volledige tekst
        name: body
        widget: markdown
        required: false

  # ── Pagina's (enkelvoudig) ─────────────────────────────────────────────────
  - name: pages
    label: Pagina's
    label_singular: Pagina
    files:
      - name: steun-ons
        label: Steun ons
        file: src/content/pages/steun-ons.md
        fields:
          - label: Titel
            name: title
            widget: string
          - label: Inhoud
            name: body
            widget: markdown

      - name: colofon
        label: Colofon
        file: src/content/pages/colofon.md
        fields:
          - label: Titel
            name: title
            widget: string
          - label: Inhoud
            name: body
            widget: markdown
