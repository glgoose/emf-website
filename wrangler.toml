name = "ernestmandelfonds-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# Cloudflare Pages static deployment
# Run: npx wrangler pages deploy dist --project-name ernestmandelfonds-website
# Or connect your GitHub repo in the Cloudflare dashboard.

pages_build_output_dir = "dist"

# Environment variables — set secrets via the Cloudflare dashboard or wrangler CLI:
# npx wrangler pages secret put LISTMONK_URL --project-name ernestmandelfonds-website
# npx wrangler pages secret put LISTMONK_LIST_UUID ...
# npx wrangler pages secret put BASEROW_URL ...
# npx wrangler pages secret put BASEROW_TOKEN ...
