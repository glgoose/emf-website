name = "ernestmandelfonds-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# Cloudflare Pages static deployment
# Run: npx wrangler pages deploy dist --project-name ernestmandelfonds-website
# Or connect your GitHub repo in the Cloudflare dashboard.

pages_build_output_dir = "dist"

# Email is sent via MailChannels (free, works automatically on Cloudflare Pages).
# Optional: override the default recipient (info@ernestmandelfonds.org):
# npx wrangler pages secret put EMAIL_TO --project-name ernestmandelfonds-website
#
# Future Baserow integration (event registrations):
# npx wrangler pages secret put BASEROW_URL --project-name ernestmandelfonds-website
# npx wrangler pages secret put BASEROW_TOKEN --project-name ernestmandelfonds-website
#
# Future Listmonk integration (newsletter):
# npx wrangler pages secret put LISTMONK_URL --project-name ernestmandelfonds-website
# npx wrangler pages secret put LISTMONK_LIST_UUID --project-name ernestmandelfonds-website
